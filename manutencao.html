<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Em Manutenção - VTM Integração</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, #0b0e1a, #03050b);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      padding: 20px;
      text-align: center;
      color: white;
    }

    .container {
      max-width: 600px;
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      padding: 50px 30px;
      border-radius: 32px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
    }

    .icon {
      font-size: 80px;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #00c6fb, #005bea);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    h1 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 12px;
      background: linear-gradient(to right, #f0f4ff, #b0caff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p {
      color: rgba(255, 255, 255, 0.7);
      font-size: 18px;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .badge {
      display: inline-block;
      background: rgba(255, 107, 107, 0.15);
      border: 1px solid rgba(255, 107, 107, 0.3);
      color: #ff6b6b;
      padding: 8px 20px;
      border-radius: 40px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .footer {
      margin-top: 30px;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.3);
    }

    .footer a {
      color: #00c6fb;
      text-decoration: none;
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 26px;
      }

      .container {
        padding: 30px 20px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="icon">🔧</div>
    <h1>Em Manutenção</h1>
    <p>Estamos realizando melhorias no sistema. <br />Voltaremos em breve com novidades!</p>
    <span class="badge">⚠️ Manutenção programada</span>
    <div class="footer">
      &copy; 2026 VTM Integração – <a href="mailto:Tecnologia em mobilidade">Tecnologia em mobilidade</a>
    </div>
  </div>
</body>

</html>
