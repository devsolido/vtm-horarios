<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ônibus perdido - VTM Integração</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 30% 40%, #0b1a2e, #03050b);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .error-container {
      max-width: 600px;
      width: 100%;
      text-align: center;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px);
      border-radius: 40px;
      padding: 50px 30px 40px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-10px);
      }
    }

    .bus-icon {
      font-size: 80px;
      color: #00c6fb;
      background: rgba(0, 198, 251, 0.08);
      width: 120px;
      height: 120px;
      line-height: 130px;
      border-radius: 50%;
      margin: 0 auto 20px;
      border: 2px dashed rgba(0, 198, 251, 0.25);
      animation: spin 8s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .bus-icon i {
      display: inline-block;
      animation: busMove 1.5s ease-in-out infinite alternate;
    }

    @keyframes busMove {
      0% {
        transform: translateX(-8px);
      }

      100% {
        transform: translateX(8px);
      }
    }

    h1 {
      font-size: 80px;
      font-weight: 900;
      background: linear-gradient(135deg, #00c6fb, #005bea);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
      letter-spacing: -2px;
    }

    h2 {
      color: #fff;
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 12px;
    }

    p {
      color: rgba(255, 255, 255, 0.6);
      font-size: 18px;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    p strong {
      color: #00c6fb;
      font-weight: 600;
    }

    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, #00c6fb, #005bea);
      border: none;
      color: #fff;
      font-size: 18px;
      font-weight: 600;
      padding: 14px 36px;
      border-radius: 50px;
      text-decoration: none;
      transition: all 0.3s;
      box-shadow: 0 8px 30px rgba(0, 91, 234, 0.35);
    }

    .btn-home:hover {
      transform: scale(1.05);
      box-shadow: 0 12px 40px rgba(0, 91, 234, 0.55);
    }

    .btn-home:active {
      transform: scale(0.95);
    }

    .footer-404 {
      margin-top: 30px;
      color: rgba(255, 255, 255, 0.15);
      font-size: 13px;
      letter-spacing: 1px;
    }

    .footer-404 i {
      color: #00c6fb;
      margin: 0 4px;
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 60px;
      }

      h2 {
        font-size: 22px;
      }

      p {
        font-size: 16px;
      }

      .bus-icon {
        width: 90px;
        height: 90px;
        line-height: 100px;
        font-size: 60px;
      }

      .btn-home {
        font-size: 16px;
        padding: 12px 28px;
      }

      .error-container {
        padding: 30px 20px;
      }
    }
  </style>
</head>

<body>
  <div class="error-container">
    <div class="bus-icon">
      <i class="fas fa-bus"></i>
    </div>

    <h1>404</h1>
    <h2>Ônibus fora de rota!</h2>
    <p>
      Parece que o <strong>VTM</strong> que você procura
      não está passando por aqui agora.
      <br />
      <span style="color: rgba(255,255,255,0.4); font-size: 15px;">
        (ou a página foi desviada para outra parada)
      </span>
    </p>

    <a href="/" class="btn-home">
      <i class="fas fa-arrow-left"></i> Voltar para a garagem
    </a>

    <div class="footer-404">
      <i class="fas fa-route"></i> VTM Integração – Sempre a caminho
    </div>
  </div>
</body>

</html>
