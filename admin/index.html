<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes" />
  <title>VTM Integração - Painel Administrativo</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link rel="stylesheet" href="../style.css" />
  <link rel="stylesheet" href="admin.css?v=4" />
</head>

<body>

  <div class="admin-page">

    <!-- Cabeçalho (sempre visível) -->
    <div class="admin-header">
      <div class="admin-header-left">
        <div class="admin-title">
          <i class="fas fa-cog"></i>
          <h2>Painel Administrativo</h2>
        </div>
      </div>
      <div class="admin-header-right">
        <div class="admin-user">
          <i class="fas fa-user-circle"></i>
          <span>Igor Veras Morais</span>
        </div>
        <div class="admin-info-item" id="adminClock">
          <i class="far fa-clock"></i>
          <span class="value" id="adminClockValue">--:--:--</span>
        </div>
        <div class="admin-info-item" id="adminWeather">
          <i class="fas fa-cloud-sun"></i>
          <span class="value" id="adminWeatherValue">-- °C</span>
        </div>
        <button class="admin-header-btn logout-btn" id="logoutBtn" type="button" style="display:none;">
          <i class="fas fa-sign-out-alt"></i> Sair
        </button>
      </div>
    </div>

    <div class="admin-subtitle">
      <span>Gerencie os horários dos ônibus</span>
      <span class="admin-date"><i class="far fa-calendar-alt"></i> <span id="adminDateValue">--</span></span>
    </div>

    <!-- ============================================ -->
    <!-- PASSO 1: SENHA -->
    <!-- ============================================ -->
    <div id="stepPassword" class="auth-step">
      <div class="auth-icon"><i class="fas fa-lock"></i></div>
      <h3>Digite sua senha</h3>
      <div class="field">
        <label for="adminPassword">Senha de acesso</label>
        <div class="password-wrapper">
          <input type="password" id="adminPassword" placeholder="••••••••" />
        </div>
      </div>
      <button class="btn-save" id="passwordBtn">Verificar senha</button>
      <div id="passwordMsg" class="msg"></div>
    </div>

    <!-- ============================================ -->
    <!-- PASSO 2: CÓDIGO DE VERIFICAÇÃO + TIMER -->
    <!-- ============================================ -->
    <div id="stepCode" class="auth-step" style="display:none;">
      <div class="auth-icon"><i class="fas fa-shield-alt"></i></div>
      <h3>Digite o código de verificação</h3>

      <!-- Círculo de progresso (SVG) -->
      <div class="timer-circle">
        <svg viewBox="0 0 120 120" width="120" height="120">
          <circle cx="60" cy="60" r="54" fill="none" stroke="rgba(0,198,251,0.1)" stroke-width="8" />
          <circle cx="60" cy="60" r="54" fill="none" stroke="#00c6fb" stroke-width="8" stroke-linecap="round"
            stroke-dasharray="339.292" stroke-dashoffset="0" id="progressCircle" />
        </svg>
        <span class="timer-text" id="timerText">60s</span>
      </div>

      <p class="code-notice">✅ Código de verificação enviado, informe-o.</p>

      <div class="field">
        <label for="adminCode22">Código de verificação</label>
        <input type="text" id="adminCode22" placeholder="Digite ou cole o código" maxlength="22" autocomplete="off" />
      </div>

      <div style="display:flex; gap:10px;">
        <button class="btn-save" id="verifyCodeBtn" style="flex:2;"><i class="fas fa-check"></i> Verificar</button>
        <button class="btn-save" id="resendCodeBtn"
          style="flex:1; background: var(--filter-btn-bg) !important; color: var(--text-primary) !important;">Reenviar</button>
      </div>
      <div id="codeMsg" class="msg"></div>
    </div>

    <!-- ============================================ -->
    <!-- CONTEÚDO ADMIN (visível apenas após autenticação completa) -->
    <!-- ============================================ -->
    <div id="adminContent" style="display:none;">
      <div class="admin-toolbar">
        <div class="admin-toolbar-actions">
          <button class="btn-add-row" id="adminAddRowBtn"><i class="fas fa-plus"></i> Adicionar horário</button>
          <button class="maintenance-btn" id="maintenanceBtn" type="button">
            <i class="fas fa-tools"></i> <span id="maintenanceStatus">Manutenção: CARREGANDO...</span>
          </button>
        </div>
        <span id="adminRowCount">0 horários</span>
      </div>

      <div id="adminMsg" class="admin-msg" style="display:none;"></div>

      <div class="admin-table-wrapper">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Destino</th>
              <th>Horário</th>
              <th>Embarque</th>
              <th>Dias</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="adminTableBody"></tbody>
        </table>
      </div>

      <button class="btn-save" id="adminSaveBtn"><i class="fas fa-save"></i> Salvar alterações</button>

      <!-- Alterar senha -->
      <div class="admin-change-password">
        <h4><i class="fas fa-key"></i> Alterar senha de acesso</h4>
        <div style="display:flex; flex-wrap:wrap; gap:10px; align-items:center;">
          <input type="password" id="newPassword" placeholder="Nova senha" />
          <input type="password" id="confirmPassword" placeholder="Confirmar nova senha" />
          <button class="btn-save" id="changePasswordBtn" style="flex:0 0 auto; padding:8px 20px; width:auto;">Alterar
            senha</button>
        </div>
        <div id="changePasswordMsg" class="msg" style="margin-top:8px;"></div>
      </div>
    </div>

    <div class="admin-footer">
      <a href="../">← Voltar para o site</a>
    </div>

  </div>

  <script src="../script.js"></script>
  <script src="admin.js"></script>
</body>

</html>
